name: NeuroSim CI Validation

# Trigger the workflow on push or pull request to the main branches
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Biophysics Integration Tests
    runs-on: ubuntu-latest
    
    # A matrix build proves you understand cross-environment stability
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Speeds up subsequent runs

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the core scientific stack required for NeuroSim
        pip install pytest numpy scipy statsmodels scikit-learn nilearn
        # Fallback to requirements.txt if present
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Mathematical & Biological Assertions
      # The -v flag provides verbose output so admins can see exactly what passed
      run: |
        pytest -v test_physics.py test_connectivity.py
