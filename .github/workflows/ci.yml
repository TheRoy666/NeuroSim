name: NeuroSim CI Validation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Biophysics Integration Tests
    runs-on: ubuntu-latest
  
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the core scientific stack required for NeuroSim
        pip install pytest numpy scipy statsmodels scikit-learn nilearn
        # Fallback to requirements.txt if present
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Mathematical & Biological Assertions
      run: |
        PYTHONPATH=. pytest -v tests/
